name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'Manual build'
        required: true

jobs:
  build:
    name: Build on ${{ matrix.os }} 
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: scripts/windows/build.bat
            artifact_name: "BlenderHub-${{ github.ref_name }}-Windows"
          - os: ubuntu-latest
            script: scripts/linux/build.sh
            artifact_name: "BlenderHub-${{ github.ref_name }}-Linux"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt
      
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: "npm"
      #     cache-dependency-path: ui/package-lock.json
      
      # - name: Build UI
      #   working-directory: ui
      #   run: |
      #     npm install
      #     npm run build
      
      # Windows only
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup

      - name: Run build script
        shell: bash
        run: |
          echo "${{ github.ref_name }}" | ${{ matrix.script }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            output/*.exe
            output/*tar.xz
